name: playwright-test
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build-client-integrations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        id: pnpm-install
        with:
          version: 10
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build JS client
        run: make -C clients/js build
      - name: Build Integrations
        run: make -C integrations build
      - name: Upload built packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-packages
          path: |
            clients/js/lib
            integrations/*/dist
          retention-days: 1

  examples-playwright-js-test:
    runs-on: ubuntu-latest
    needs: build-client-integrations
    strategy:
      matrix:
        example: [wagmi-v2, wagmi-v3, encrypted-events]
    services:
      sapphire-localnet-ci:
        image: ghcr.io/oasisprotocol/sapphire-localnet:latest
        ports:
          - 8545:8545
          - 8546:8546
        env:
          OASIS_DOCKER_START_EXPLORER: no
        options: >-
          --rm
          --health-cmd="test -f /CONTAINER_READY"
          --health-start-period=90s
      # Anvil is used in wagmi examples.
      anvil-ci:
        image: ghcr.io/foundry-rs/foundry:stable
        ports:
          - 9545:8545
        options: --entrypoint anvil
        env:
          ANVIL_IP_ADDR: 0.0.0.0
    env:
      SAPPHIRE_LOCALNET_HTTP_PROXY_PORT: 3001
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        id: pnpm-install
        with:
          version: 10
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          name: built-packages
      - uses: JarvusInnovations/background-action@v1
        name: RPC proxy will error if non-encrypted calls are made
        with:
          run: pnpm run proxy &
          wait-on: http://127.0.0.1:${{ env.SAPPHIRE_LOCALNET_HTTP_PROXY_PORT }}
          tail: true
          log-output-resume: true
          wait-for: 31sec
          log-output: true
          log-output-if: true
          working-directory: clients/js

      - name: Install Playwright dependencies
        run: pnpm --if-present test:setup
        working-directory: examples/${{ matrix.example }}
      - name: Run playwright tests ${{ matrix.example }} (with xvfb-run to support headed extension test)
        working-directory: examples/${{ matrix.example }}
        run: xvfb-run pnpm test
      - name: Upload playwright test-results
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-${{ matrix.example }}
          path: examples/${{ matrix.example }}/test-results
          retention-days: 5
